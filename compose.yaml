networks:
  wb-tariffs-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local

services:
  postgres:
    container_name: postgres
    image: postgres:16.1-alpine
    environment:
      PGPORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - wb-tariffs-net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      NODE_ENV: production
      APP_PORT: ${APP_PORT:-3000}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      FETCH_INTERVAL_MINUTES: ${FETCH_INTERVAL_MINUTES:-60}
      WB_API_TOKEN: ${WB_API_TOKEN:-}
      WB_API_URL: ${WB_API_URL:-https://common-api.wildberries.ru/api/v1/tariffs/box}
      WB_API_REQUEST_TIMEOUT_MS: ${WB_API_REQUEST_TIMEOUT_MS:-30000}
      GOOGLE_SPREADSHEET_IDS: ${GOOGLE_SPREADSHEET_IDS:-}
      GOOGLE_SHEET_NAME: ${GOOGLE_SHEET_NAME:-stocks_coefs}
      GOOGLE_SERVICE_ACCOUNT_CREDENTIALS_BASE64: ${GOOGLE_SERVICE_ACCOUNT_CREDENTIALS_BASE64:-}
      SORT_BY_COEFFICIENT: ${SORT_BY_COEFFICIENT:-box_delivery_coef_expr}
      TZ: ${APP_TIMEZONE:-Europe/Moscow}
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wb-tariffs-net
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${APP_PORT:-3000}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
